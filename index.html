<!DOCTYPE html>
<html>
<head>
<title>AstroCast</title>
<audio id="bgMusic" src="/audio/FeelGood.mp3" autoplay loop></audio>
<button onclick="document.getElementById('bgMusic').paused ? document.getElementById('bgMusic').play() : document.getElementById('bgMusic').pause()" style="position:absolute;top:20px;right:20px;padding:8px 12px;">🎵 Toggle Music</button>
<style>
body{margin:0;font-family:Arial;color:white;overflow:hidden;background:black;}
/* Starry background */
body::before{
content:"";
position:fixed;width:100%;height:100%;
background:
radial-gradient(white 1px, transparent 1px),
radial-gradient(white 1px, transparent 1px);
background-size:40px 40px;opacity:0.3;
z-index:-1;
}
/* Homepage container */
#homepage{
position:fixed;top:0;left:0;width:100%;height:100%;
display:flex;flex-direction:column;align-items:center;justify-content:center;
text-align:center;opacity:1;transition:opacity 1s;
}
.logo{font-size:60px;opacity:0;animation:fadeIn 1.5s forwards;animation-delay:0.5s;}
.subtitle{font-size:22px;margin-top:10px;opacity:0;animation:fadeIn 1.5s forwards;animation-delay:1.2s;}
.startBtn{margin-top:30px;padding:15px 35px;font-size:22px;background:#1e90ff;border:none;border-radius:10px;color:white;cursor:pointer;opacity:0;animation:fadeIn 1.5s forwards;animation-delay:2s;}
@keyframes fadeIn{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}
</style>
</head>
<body>
<div id="homepage">
  <div class="logo">🌌 AstroCast ☄️</div>
  <div class="subtitle">The weather site for your curiosity.</div>
  <button class="startBtn" onclick="startRadar()">See Live Radar</button>
</div>

<script>
// Fade out then go to radar page
function startRadar(){
  const homepage = document.getElementById("homepage");
  homepage.style.opacity="0";
  setTimeout(()=>{
    window.location.href="/AstroCast/radar"; // redirect to radar folder
  },1000);
}
</script>
</body>
</html>
